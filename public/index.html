<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Task Manager - Gestão de Tarefas</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Gestor de Tarefas</h1>
            <p class="subtitle">Organize suas atividades de forma simples e eficiente</p>
        </header>
        <main class="main-content">
            <section class="input-section">
                <h2>Nova Tarefa</h2>
                <form id="taskForm" class="task-form">
                    <div class="form-group">
                        <input type="text" id="titleInput" placeholder="Título da Tarefa" class="form-input" novalidate>
                    </div>
                    <div class="form-group">
                        <textarea name="form-textarea" id="descriptionInput" placeholder="Descrição Opcional" class="form-textarea"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Adicionar Tarefa</button>
                </form>
                <div id="formMessage" class="message"></div>
            </section>

            <section class="tasks-section">
                <h2>Minhas Tarefas</h2>
                <div id="loadingSpinner" class="loading">
                    Carregando tarefas...
                </div>
                <ul id="taskList" class="task-list">

                </ul>
                <div id="emptyMessage" class="empty-message" style="display: none;">
                    <p>Nenhuma tarefa encontrada</p>
                    <p>Adicione uma nova tarefa para começar</p>
                </div>
            </section>
        </main>
        <footer class="footer">
             <p>&copy; 2026 Task Manager - Bacelar - Soluções Tecnologicas</p>
        </footer>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
